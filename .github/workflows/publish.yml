name: Publish to npm

permissions:
  contents: read
  id-token: write

on:
  release:
    types: [published]

jobs:
  publish:
    name: Publish @henkas/orderfood
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm build

      - name: Verify packed npm artifact
        run: pnpm --filter @henkas/orderfood check:pack

      - name: Publish
        run: pnpm publish --filter @henkas/orderfood --access public --no-git-checks
